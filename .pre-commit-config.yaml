repos:
  # ── Secrets Detection ────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: (\.secrets\.baseline|package-lock\.json|yarn\.lock)

  # ── Backend: .NET Linting & Tests ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format (lint)
        language: system
        entry: dotnet format src/ --verify-no-changes --severity warn
        pass_filenames: false
        types: [c#]

      - id: dotnet-build
        name: dotnet build
        language: system
        entry: dotnet build src/ --no-incremental -warnaserror
        pass_filenames: false
        types: [c#]

      - id: dotnet-test
        name: dotnet test
        language: system
        entry: dotnet test src/ --no-build
        pass_filenames: false
        types: [c#]

  # ── Frontend: ESLint, Type-check & Tests ─────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (lint)
        language: system
        entry: bash -c "cd src/client && npm run lint"
        pass_filenames: false
        types_or: [ts, tsx, javascript]

      - id: tsc
        name: TypeScript type-check
        language: system
        entry: bash -c "cd src/client && npx tsc --noEmit"
        pass_filenames: false
        types_or: [ts, tsx]

      - id: vitest
        name: Vitest (frontend unit tests)
        language: system
        entry: bash -c "cd src/client && npm run test -- --run"
        pass_filenames: false
        types_or: [ts, tsx]
